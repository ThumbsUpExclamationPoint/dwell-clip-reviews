<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dwell Clip Reviews</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
         background:#f5f5f7;color:#1d1d1f;padding:48px 20px;max-width:720px;
         margin:0 auto;font-size:15px;line-height:1.55}
    h1{font-size:28px;font-weight:600;margin-bottom:6px}
    .lede{color:#6e6e73;margin-bottom:32px}
    ul.weeks{list-style:none}
    ul.weeks li{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:10px;
                box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;
                justify-content:space-between;align-items:center}
    ul.weeks li a{color:#007aff;text-decoration:none;font-weight:500}
    ul.weeks li a:hover{text-decoration:underline}
    ul.weeks li .meta{font-size:13px;color:#8e8e93}
    .empty{background:#fff;border-radius:10px;padding:24px;text-align:center;color:#6e6e73}
    footer{margin-top:48px;font-size:13px;color:#8e8e93;
           border-top:1px solid #d1d1d6;padding-top:16px}
  </style>
</head>
<body>
  <h1>Dwell Clip Reviews</h1>
  <p class="lede">Weekly sermon-clip review pages from Cleo. Each link opens that week's clips with feedback fields for selection and aesthetics. Pages auto-expire after 30 days.</p>
  <ul class="weeks">
    <li><a href="2026-04-29/">Week of Wednesday, April 29, 2026</a><span class="meta">2026-04-29</span></li>
  </ul>
  <footer>Maintained by <a href="mailto:matt@dwellpeninsula.com">Matt Stephan</a>. Generated by Cleo. Architecture by Obi.</footer>
</body>
</html>
